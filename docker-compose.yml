services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-argus}
      POSTGRES_USER: ${POSTGRES_USER:-argus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-argus_dev}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-argus}"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  rtsp-simulator:
    image: bluenviron/mediamtx:latest
    ports:
      - "8554:8554"
      - "8888:8888"
    environment:
      MTX_PROTOCOLS: tcp

  rtsp-feed-cam1:
    image: linuxserver/ffmpeg:latest
    entrypoint: >
      ffmpeg -stream_loop -1 -re -i /videos/cam1_security.mp4
      -vf scale=640:480
      -c:v libx264 -preset ultrafast -tune zerolatency
      -f rtsp rtsp://rtsp-simulator:8554/cam1
    volumes:
      - ./data/videos:/videos:ro
    depends_on:
      - rtsp-simulator
    restart: on-failure

  rtsp-feed-cam2:
    image: linuxserver/ffmpeg:latest
    entrypoint: >
      ffmpeg -stream_loop -1 -re -i /videos/cam2_intruder.mp4
      -vf scale=640:480
      -c:v libx264 -preset ultrafast -tune zerolatency
      -f rtsp rtsp://rtsp-simulator:8554/cam2
    volumes:
      - ./data/videos:/videos:ro
    depends_on:
      - rtsp-simulator
    restart: on-failure

  rtsp-feed-cam3:
    image: linuxserver/ffmpeg:latest
    entrypoint: >
      ffmpeg -stream_loop -1 -re -i /videos/12566041-uhd_3840_2160_30fps.mp4
      -vf scale=640:480
      -c:v libx264 -preset ultrafast -tune zerolatency
      -f rtsp rtsp://rtsp-simulator:8554/cam3
    volumes:
      - ./data/videos:/videos:ro
    depends_on:
      - rtsp-simulator
    restart: on-failure

  rtsp-feed-cam4:
    image: linuxserver/ffmpeg:latest
    entrypoint: >
      ffmpeg -stream_loop -1 -re -i /videos/5977704-hd_1366_586_30fps.mp4
      -vf scale=640:480
      -c:v libx264 -preset ultrafast -tune zerolatency
      -f rtsp rtsp://rtsp-simulator:8554/cam4
    volumes:
      - ./data/videos:/videos:ro
    depends_on:
      - rtsp-simulator
    restart: on-failure

  rtsp-feed-cam5:
    image: linuxserver/ffmpeg:latest
    entrypoint: >
      ffmpeg -stream_loop -1 -re -i /videos/3700915-hd_1920_1080_30fps.mp4
      -vf scale=640:480
      -c:v libx264 -preset ultrafast -tune zerolatency
      -f rtsp rtsp://rtsp-simulator:8554/cam5
    volumes:
      - ./data/videos:/videos:ro
    depends_on:
      - rtsp-simulator
    restart: on-failure

  rtsp-feed-cam6:
    image: linuxserver/ffmpeg:latest
    entrypoint: >
      ffmpeg -stream_loop -1 -re -i /videos/15498631_3840_2160_25fps.mp4
      -vf scale=640:480
      -c:v libx264 -preset ultrafast -tune zerolatency
      -f rtsp rtsp://rtsp-simulator:8554/cam6
    volumes:
      - ./data/videos:/videos:ro
    depends_on:
      - rtsp-simulator
    restart: on-failure

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: ./backend
    command: celery -A app.workers.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:

services:
  - type: web
    name: argus-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: argus-db
          property: connectionURI
      - key: REDIS_URL
        fromService:
          type: redis
          name: argus-redis
          property: connectionURI
      - key: AI_PROVIDER
        value: yolo
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        sync: false
      - key: RTSP_SIMULATOR_URL
        value: rtsp://localhost:8554

  - type: worker
    name: argus-celery-worker
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    dockerCommand: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: argus-db
          property: connectionURI
      - key: REDIS_URL
        fromService:
          type: redis
          name: argus-redis
          property: connectionURI
      - key: AI_PROVIDER
        value: yolo
      - key: SECRET_KEY
        sync: false

  - type: worker
    name: argus-celery-beat
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    dockerCommand: celery -A app.workers.celery_app beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: argus-db
          property: connectionURI
      - key: REDIS_URL
        fromService:
          type: redis
          name: argus-redis
          property: connectionURI
      - key: SECRET_KEY
        sync: false

  - type: redis
    name: argus-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: argus-db
    plan: free
    databaseName: argus
    user: argus
